<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Farmer Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* NAVBAR */
.navbar {
    width: 100%;
    background: #2b9348; /* farmer theme */
    color: white;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.left-nav {
    display: flex;
    gap: 10px;
}

.nav-btn {
    background: white;
    color: #2b9348;
    padding: 6px 12px;
    border-radius: 5px;
    border: none;
    font-weight: bold;
    cursor: pointer;
}
.nav-btn:hover { background: #d9f5df; }

.center-links {
    flex: 1;
    display: flex;
    justify-content: center;
    gap: 25px;
}
.center-links a {
    color: white;
    text-decoration: none;
    font-size: 16px;
    font-weight: 500;
}
.center-links a:hover { text-decoration: underline; }

/* HEADER */
header {
    background: #2b9348;
    color: white;
    text-align: center;
    padding: 15px;
}

/* HERO SECTION */
.hero-wrapper {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 85%;
    margin: 40px auto;
    padding: 20px;
    gap: 20px;
}

.hero-left {
    flex: 1;
    animation: fadeIn 1.5s ease-in-out;
}
.hero-title {
    font-size: 32px;
    color: #2b9348;
    margin-bottom: 15px;
    font-weight: bold;
}
.hero-quote {
    font-size: 20px;
    color: #1f6d36;
    line-height: 1.5;
    font-weight: 500;
}

/* RIGHT IMAGE */
.hero-right {
    flex: 1;
    display: flex;
    justify-content: center;
}
.hero-img {
    width: 90%;
    max-width: 420px;
    height: 350px;
    border-radius: 15px;
    object-fit: cover;
    animation: floatUpDown 2s ease-in-out infinite alternate;
}

/* Animations */
@keyframes floatUpDown {
    from { transform: translateY(0); }
    to   { transform: translateY(-20px); }
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* FOOTER */
footer {
    background: #2b9348;
    color: white;
    text-align: center;
    padding: 12px;
    margin-top: auto;
}

/* Responsive */
@media (max-width: 768px) {
    .hero-wrapper {
        flex-direction: column;
        text-align: center;
    }
    .hero-img {
        width: 80%;
        height: auto;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <!-- Left buttons -->
    <div class="left-nav">
        <button class="nav-btn" onclick="window.history.back();">← Back</button>
        <button class="nav-btn" onclick="location.href='../index.html';">Home</button>
    </div>

    <!-- Center nav links -->
    <div class="center-links">
        <a href="farmerDashboard.html">Home</a>
        <a href="addProduct.html">Add Product</a>
        <a href="manageProducts.html">Manage Products</a>
        <a href="rentInstrument.html">Rent Instruments</a>
        <a href="viewOrders.html">View Orders</a>
        <a href="../login.html">Logout</a>
    </div>
</div>

<header><h1>Farmer Dashboard</h1></header>

<!-- HERO SECTION -->
<div class="hero-wrapper">

    <!-- LEFT TEXT -->
    <div class="hero-left">
        <h1 class="hero-title">Grow • Earn • Connect</h1>
        <p class="hero-quote">
            “Empowering farmers with technology.<br>
            Sell your produce, rent tools, and manage your farm easily.”
        </p>
    </div>

    <!-- RIGHT IMAGE -->
    <div class="hero-right">
        <img 
            src="https://plus.unsplash.com/premium_photo-1682092660676-c68b30dce510?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" 
            class="hero-img" 
            alt="Farmer Image">
    </div>

</div>

<footer>&copy; 2025 Farmer-Consumer Connect | Developed by Kuldeep</footer>

</body>
</html>
