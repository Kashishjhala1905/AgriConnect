<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consumer Profile</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* SAME NAVBAR AS rentInstruments.html */
.navbar {
    width: 100%;
    background: #1e6091;
    color: white;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.left-nav {
    display: flex;
    gap: 10px;
}

.nav-btn {
    background: white;
    color: #1e6091;
    padding: 6px 12px;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
    border: none;
}
.nav-btn:hover { background: #dff1ff; }

.center-links {
    flex: 1;
    display: flex;
    justify-content: center;
    gap: 25px;
}
.center-links a {
    color: white;
    text-decoration: none;
    font-size: 16px;
}
.center-links a:hover { text-decoration: underline; }

/* Header + Footer */
header {
    background: #1e6091;
    color: white;
    text-align: center;
    padding: 15px;
}

footer {
    background: #1e6091;
    color: white;
    text-align: center;
    padding: 12px;
    margin-top: auto; /* stick to bottom */
}

/* PROFILE CONTAINER */
.container {
    max-width: 600px;
    margin: 40px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

input {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
}
button {
    background: #1e6091;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
}
button:hover { background: #184e77; }
</style>

</head>

<body>

<!-- NAVBAR (Same as rentInstruments.html) -->
<div class="navbar">

    <!-- Left nav buttons -->
    <div class="left-nav">
        <button class="nav-btn" onclick="window.history.back();">← Back</button>
        <button class="nav-btn" onclick="location.href='../index.html';">Home</button>
    </div>

    <!-- Center links -->
    <div class="center-links">
        <a href="consumerDashboard.html">Home</a>
        <a href="browseProducts.html">Browse Products</a>
        <a href="rentInstruments.html">Rent Instruments</a>
        <a href="orders.html">My Orders</a>
        <a href="consumerProfile.html">Profile</a>
        <a href="../login.html">Logout</a>
    </div>
</div>

<header><h1>Consumer Profile</h1></header>

<div class="container">

    <form action="../servlets/UpdateConsumerServlet" method="post">

        <label>Name:</label>
        <input type="text" name="name" value="Rahul Sharma" required>

        <label>Email:</label>
        <input type="email" name="email" value="rahul@gmail.com" required>

        <label>Contact Number:</label>
        <input type="text" name="contact" value="9876543210" required>

        <label>Address:</label>
        <input type="text" name="address" value="Bhopal, MP" required>

        <button type="submit">Update Profile</button>
    </form>

</div>

<footer>&copy; 2025 Farmer-Consumer Connect | Developed by Kuldeep</footer>

</body>
</html>
