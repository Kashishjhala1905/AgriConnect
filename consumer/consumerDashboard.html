<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consumer Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f8;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* NAVBAR */
.navbar {
    width: 100%;
    background: #1e6091;
    color: white;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}

.left-nav {
    display: flex;
    gap: 10px;
}

.nav-btn {
    background: white;
    color: #1e6091;
    padding: 6px 12px;
    border-radius: 5px;
    font-weight: bold;
    cursor: pointer;
    border: none;
}
.nav-btn:hover { background: #dff1ff; }

.center-links {
    flex: 1;
    display: flex;
    justify-content: center;
    gap: 25px;
}
.center-links a {
    color: white;
    text-decoration: none;
    font-size: 16px;
}
.center-links a:hover { text-decoration: underline; }

/* HEADER */
header {
    background: #1e6091;
    color: white;
    text-align: center;
    padding: 15px;
}

/* HERO SECTION — LEFT TEXT + RIGHT IMAGE */
.hero-wrapper {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 85%;
    margin: 40px auto;
    padding: 20px;
    gap: 20px;
}

/* LEFT HALF */
.hero-left {
    flex: 1;
    padding: 20px;
    animation: fadeIn 1.5s ease-in-out;
}
.hero-title {
    font-size: 32px;
    color: #1e6091;
    margin-bottom: 15px;
    font-weight: bold;
}
.hero-quote {
    font-size: 20px;
    color: #144b73;
    line-height: 1.5;
    font-weight: 500;
}

/* RIGHT HALF */
.hero-right {
    flex: 1;
    display: flex;
    justify-content: center;
}
.hero-img {
    width: 90%;
    max-width: 420px;
    height: 350px;
    border-radius: 15px;
    object-fit: cover;
    animation: floatUpDown 2s ease-in-out infinite alternate;
}

/* Animations */
@keyframes floatUpDown {
    from { transform: translateY(0px); }
    to   { transform: translateY(-20px); }
}
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* FOOTER */
footer {
    background: #1e6091;
    color: white;
    text-align: center;
    padding: 12px;
    margin-top: auto;
}

/* Responsive for mobile */
@media (max-width: 768px) {
    .hero-wrapper {
        flex-direction: column;
        text-align: center;
    }
    .hero-left, .hero-right {
        width: 100%;
    }
    .hero-img {
        width: 80%;
        height: auto;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">

    <!-- Left buttons -->
    <div class="left-nav">
        <button class="nav-btn" onclick="window.history.back();">← Back</button>
        <button class="nav-btn" onclick="location.href='../index.html';">Home</button>
    </div>

    <!-- Center nav links -->
    <div class="center-links">
        <a href="consumerDashboard.html">Home</a>
        <a href="browseProducts.html">Browse Products</a>
        <a href="rentInstruments.html">Rent Instruments</a>
        <a href="orders.html">My Orders</a>
        <a href="consumerProfile.html">Profile</a>
        <a href="../login.html">Logout</a>
    </div>
</div>

<header><h1>Consumer Dashboard</h1></header>

<!-- HERO SECTION -->
<div class="hero-wrapper">

    <!-- LEFT SIDE TEXT -->
    <div class="hero-left">
        <h1 class="hero-title">Welcome to FarmConnect</h1>
        <p class="hero-quote">
            “Supporting farmers. Empowering consumers.<br>
            Fresh harvest delivered directly from local farms.”
        </p>
    </div>

    <!-- RIGHT SIDE IMAGE -->
    <div class="hero-right">
        <img 
            src="https://plus.unsplash.com/premium_photo-1661411325413-98a5ff88e8e4?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
            class="hero-img">
    </div>

</div>

<footer>&copy; 2025 Farmer-Consumer Connect | Developed by Kuldeep</footer>

</body>
</html>
