body { font-family: Arial; background: #f4f6f8; margin: 0; }

/* Navbar */
.navbar {
    width: 100%;

    color: white;
    padding: 12px 20px;

    cursor: pointer;
    font-size: 15px;
    transition: 0.3s;
}
.back-btn:hover, .home-btn:hover { background: #184e77; }

/* Original Styles */
header, footer { background: #1e6091; color: white; text-align: center; padding: 15px; }
table {

    margin: 30px auto;

    background: white;

}
th, td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #ddd;
}
th { background: #1e6091; color: white; }
tr:hover { background: #f0f0f0; }
