<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Farmer Connect | Login</title>
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(27,94,32,0.8), rgba(46,125,50,0.8)), 
                        url('images/green-field.jpg') no-repeat center center/cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #fff;
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0px 8px 30px rgba(0,0,0,0.4);
            width: 380px;
            text-align: center;
            animation: fadeIn 1s ease-in-out;
        }
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(-20px);}
            to {opacity: 1; transform: translateY(0);}
        }
        h2 {
            color: #1b5e20;
            margin-bottom: 25px;
            font-size: 26px;
            letter-spacing: 1px;
        }
        .input-box {
            position: relative;
            margin: 15px 0;
        }
        .input-box input {
            width: 90%;
            padding: 12px 40px 12px 15px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        .input-box input:focus {
            border-color: #1b5e20;
            box-shadow: 0px 0px 8px rgba(27,94,32,0.5);
        }
        .input-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #1b5e20;
            font-size: 18px;
        }
        button {
            background: linear-gradient(90deg, #1b5e20, #66bb6a);
            color: white;
            border: none;
            padding: 12px 20px;
            margin-top: 20px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background: linear-gradient(90deg, #145a19, #4caf50);
            transform: scale(1.05);
        }
        .link {
            margin-top: 20px;
            font-size: 14px;
        }
        .link a {
            color: #1b5e20;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .link a:hover {
            text-decoration: underline;
            color: #145a19;
        }
        .message {
            color: green;
            margin-bottom: 10px;
        }
        .error {
            color: red;
            margin-bottom: 10px;
        }
    </style>
    <!-- Font Awesome Icons -->
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <h2>Welcome Back 👋</h2>

        <!-- Optional static messages -->
        <p id="successMsg" class="message" style="display:none;">Login successful!</p>
        <p id="errorMsg" class="error" style="display:none;">Invalid email or password.</p>

        <form action="LoginServlet" method="post">
            <div class="input-box">
                <input type="email" name="email" placeholder="Email Address" required>
                <i class="fas fa-envelope"></i>
            </div>
            <div class="input-box">
                <input type="password" name="password" placeholder="Password" required>
                <i class="fas fa-lock"></i>
            </div>
            <button type="submit">Login</button>
        </form>

        <div class="link">
            New to Farmer Connect? <a href="register.html">Create an Account</a>
        </div>
    </div>
</body>
</html>
